<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=390, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TT语音K歌房 - 手机预览</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a1a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 手机壳容器 */
        .phone-container {
            position: relative;
            width: 430px;
            height: 890px;
            background: #2d2d2d;
            border-radius: 40px;
            padding: 23px 20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4), 0 0 0 1px #3a3a3a inset;
        }

        /* 手机屏幕 */
        .phone-screen {
            width: 390px;
            height: 844px;
            position: relative;
            overflow: hidden;
            border-radius: 28px;
            background: linear-gradient(180deg, #2d1b4e 0%, #1a0a2e 100%);
        }

        /* 顶部听筒 */
        .phone-notch {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 30px;
            background: #1a1a1a;
            border-radius: 20px;
            z-index: 1000;
        }

        /* 音量和电源键 */
        .phone-button {
            position: absolute;
            background: #4a4a4a;
        }

        .phone-button.volume-up {
            left: -4px;
            top: 120px;
            width: 4px;
            height: 35px;
            border-radius: 2px 0 0 2px;
        }

        .phone-button.volume-down {
            left: -4px;
            top: 165px;
            width: 4px;
            height: 35px;
            border-radius: 2px 0 0 2px;
        }

        .phone-button.power {
            right: -4px;
            top: 140px;
            width: 4px;
            height: 50px;
            border-radius: 0 2px 2px 0;
        }

        /* 樱花背景 */
        .sakura-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('./kefang-full-design.jpg');
            background-size: cover;
            background-position: center;
            opacity: 0.4;
            z-index: 0;
        }

        .sakura-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at top, rgba(100, 50, 120, 0.45) 0%, transparent 55%),
                        radial-gradient(ellipse at bottom, rgba(50, 30, 80, 0.65) 0%, transparent 65%);
            z-index: 1;
        }

        /* 内容容器 */
        .content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* 滚动区域 */
        .scroll-container {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 85px;
            -webkit-overflow-scrolling: touch;
        }

        .scroll-container::-webkit-scrollbar {
            display: none;
        }

        /* 按钮点击效果 */
        .btn-press:active {
            transform: scale(0.95);
            opacity: 0.85;
            transition: all 0.12s ease;
        }

        /* 弹窗样式 */
        .modal-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.78);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
            animation: fadeIn 0.2s ease-out;
        }

        .modal {
            width: 88%;
            max-width: 335px;
            background: linear-gradient(180deg, #2d1b4e 0%, #1a0a2e 100%);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            overflow: hidden;
            animation: modalSlideIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes modalSlideIn {
            from { opacity: 0; transform: translateY(22px) scale(0.94); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.06); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .singing-avatar {
            animation: pulse 1.5s ease-in-out infinite;
        }

        .gift-btn {
            animation: bounce 2s ease-in-out infinite;
        }

        .message-item {
            animation: fadeIn 0.3s ease-out;
        }

        /* 麦位指示器 */
        .mic-indicator {
            position: absolute;
            bottom: -4px;
            left: 50%;
            transform: translateX(-50%);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 9px;
            font-weight: 700;
            white-space: nowrap;
        }

        /* 提示文本 */
        .preview-info {
            position: absolute;
            top: -45px;
            left: 50%;
            transform: translateX(-50%);
            color: #888;
            font-size: 13px;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
