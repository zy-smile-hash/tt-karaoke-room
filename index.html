<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TT语音K歌房 - 交互演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .phone-container {
            width: 375px;
            height: 812px;
            background-color: #000;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            position: relative;
        }
        
        .phone-screen {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }
        
        .page {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease;
            background: #1a1a1a;
        }
        
        .page.active {
            opacity: 1;
            visibility: visible;
        }
        
        .page-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        
        .page-title {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            text-align: center;
            display: none;
        }
        
        .back-button {
            position: absolute;
            top: 50px;
            left: 20px;
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 100;
            color: white;
            font-size: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .back-button.visible {
            opacity: 1;
        }
        
        .hotspots {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .hotspot {
            position: absolute;
            cursor: pointer;
            border-radius: 4px;
            transition: background-color 0.2s;
        }
        
        .hotspot:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }
        
        .hotspot-shangmai { top: 452px; left: 41px; width: 60px; height: 60px; }
        .hotspot-xiamai { top: 453px; left: 182px; width: 60px; height: 60px; }
        .hotspot-guanbi { top: 44px; left: 329px; width: 30px; height: 30px; }
        .hotspot-fenxiang { top: 44px; left: 288px; width: 30px; height: 30px; }
        .hotspot-zaixian { top: 94px; left: 328px; width: 30px; height: 30px; }
        .hotspot-yidian { top: 394px; left: 13px; width: 80px; height: 30px; }
        .hotspot-wodeduanwei { top: 103px; left: 62px; width: 80px; height: 20px; }
        .hotspot-dacall { top: 529px; left: 296px; width: 70px; height: 70px; }
        .hotspot-shoucang { top: 44px; left: 250px; width: 30px; height: 30px; }
        .hotspot-gengduo { top: 755px; left: 331px; width: 30px; height: 30px; }
        .hotspot-xiaoxi { top: 755px; left: 286px; width: 30px; height: 30px; }
        .hotspot-diange { top: 410px; left: 301px; width: 60px; height: 20px; }
        .hotspot-dianzan { top: 86px; left: 134px; width: 10px; height: 10px; }
        .hotspot-liaotian { top: 754px; left: 15px; width: 160px; height: 30px; }
        .hotspot-yunying { top: 411px; left: 189px; width: 100px; height: 20px; }
        .hotspot-songli { top: 753px; left: 194px; width: 30px; height: 30px; }
        .hotspot-yinliang { top: 753px; left: 239px; width: 30px; height: 30px; }
    </style>
</head>
<body>
    <div class="phone-container">
        <div class="phone-screen">
            <div class="back-button" id="backBtn">&larr;</div>
            
            <div class="page active" id="homePage">
                <img src="design_image.png" alt="TT语音K歌房首页" class="page-image">
                <div class="hotspots" id="homeHotspots">
                    <div class="hotspot hotspot-shangmai" data-page="shangmai" data-name="上麦"></div>
                    <div class="hotspot hotspot-xiamai" data-page="xiamai" data-name="下麦"></div>
                    <div class="hotspot hotspot-guanbi" data-page="guanbi" data-name="关闭"></div>
                    <div class="hotspot hotspot-fenxiang" data-page="fenxiang" data-name="分享"></div>
                    <div class="hotspot hotspot-zaixian" data-page="zaixian" data-name="在线人员"></div>
                    <div class="hotspot hotspot-yidian" data-page="yidian" data-name="已点"></div>
                    <div class="hotspot hotspot-wodeduanwei" data-page="wodeduanwei" data-name="我的段位"></div>
                    <div class="hotspot hotspot-dacall" data-page="dacall" data-name="打call"></div>
                    <div class="hotspot hotspot-shoucang" data-page="shoucang" data-name="收藏"></div>
                    <div class="hotspot hotspot-gengduo" data-page="gengduo" data-name="更多功能"></div>
                    <div class="hotspot hotspot-xiaoxi" data-page="xiaoxi" data-name="消息"></div>
                    <div class="hotspot hotspot-diange" data-page="diange" data-name="点歌"></div>
                    <div class="hotspot hotspot-dianzan" data-page="dianzan" data-name="点赞数"></div>
                    <div class="hotspot hotspot-liaotian" data-page="liaotian" data-name="聊天框"></div>
                    <div class="hotspot hotspot-yunying" data-page="yunying" data-name="运营活动"></div>
                    <div class="hotspot hotspot-songli" data-page="songli" data-name="送礼"></div>
                    <div class="hotspot hotspot-yinliang" data-page="yinliang" data-name="音量"></div>
                </div>
            </div>
            
            <div class="page" id="shangmaiPage">
                <img src="shangmai.jpg" alt="上麦" class="page-image" onerror="handleImageError(this)">
                <div class="page-title" id="titleShangmai">上麦页面</div>
            </div>
            
            <div class="page" id="xiamaiPage">
                <img src="xiamai.jpg" alt="下麦" class="page-image" onerror="handleImageError(this)">
                <div class="page-title" id="titleXiamai">下麦页面</div>
            </div>
            
            <div class="page" id="guanbiPage">
                <img src="guanbi.jpg" alt="关闭" class="page-image" onerror="handleImageError(this)">
                <div class="page-title" id="titleGuanbi">关闭页面</div>
            </div>
            
            <div class="page" id="fenxiangPage">
                <img src="fenxiang.jpg" alt="分享" class="page-image" onerror="handleImageError(this)">
                <div class="page-title" id="titleFenxiang">分享页面</div>
            </div>
            
            <div class="page" id="zaixianPage">
                <img src="zaixian.jpg" alt="在线人员" class="page-image" onerror="handleImageError(this)">
                <div class="page-title" id="titleZaixian">在线人员页面</div>
            </div>
            
            <div class="page" id="yidianPage">
                <img src="yidian.jpg" alt="已点" class="page-image" onerror="handleImageError(this)">
                <div class="page-title" id="titleYidian">已点页面</div>
            </div>
            
            <div class="page" id="wodeduanweiPage">
                <img src="wodeduanwei.jpg" alt="我的段位" class="page-image" onerror="handleImageError(this)">
                <div class="page-title" id="titleWodeduanwei">我的段位页面</div>
            </div>
            
            <div class="page" id="dacallPage">
                <img src="dacall.jpg" alt="打call" class="page-image" onerror="handleImageError(this)">
                <div class="page-title" id="titleDacall">打call页面</div>
            </div>
            
            <div class="page" id="shoucangPage">
                <img src="shoucang.jpg" alt="收藏" class="page-image" onerror="handleImageError(this)">
                <div class="page-title" id="titleShoucang">收藏页面</div>
            </div>
            
            <div class="page" id="gengduoPage">
                <img src="gengduo.jpg" alt="更多功能" class="page-image" onerror="handleImageError(this)">
                <div class="page-title" id="titleGengduo">更多功能页面</div>
            </div>
            
            <div class="page" id="xiaoxiPage">
                <img src="xiaoxi.jpg" alt="消息" class="page-image" onerror="handleImageError(this)">
                <div class="page-title" id="titleXiaoxi">消息页面</div>
            </div>
            
            <div class="page" id="diangePage">
                <img src="diange.jpg" alt="点歌" class="page-image" onerror="handleImageError(this)">
                <div class="page-title" id="titleDiange">点歌页面</div>
            </div>
            
            <div class="page" id="dianzanPage">
                <img src="dianzan.jpg" alt="点赞数" class="page-image" onerror="handleImageError(this)">
                <div class="page-title" id="titleDianzan">点赞数页面</div>
            </div>
            
            <div class="page" id="liaotianPage">
                <img src="liaotian.jpg" alt="聊天框" class="page-image" onerror="handleImageError(this)">
                <div class="page-title" id="titleLiaotian">聊天框页面</div>
            </div>
            
            <div class="page" id="yunyingPage">
                <img src="yunying.jpg" alt="运营活动" class="page-image" onerror="handleImageError(this)">
                <div class="page-title" id="titleYunying">运营活动页面</div>
            </div>
            
            <div class="page" id="songliPage">
                <img src="songli.jpg" alt="送礼" class="page-image" onerror="handleImageError(this)">
                <div class="page-title" id="titleSongli">送礼页面</div>
            </div>
            
            <div class="page" id="yinliangPage">
                <img src="yinliang.jpg" alt="音量" class="page-image" onerror="handleImageError(this)">
                <div class="page-title" id="titleYinliang">音量页面</div>
            </div>
            
        </div>
    </div>
    
    <script>
        const pages = {
            home: document.getElementById('homePage'),
            shangmai: document.getElementById('shangmaiPage'),
            xiamai: document.getElementById('xiamaiPage'),
            guanbi: document.getElementById('guanbiPage'),
            fenxiang: document.getElementById('fenxiangPage'),
            zaixian: document.getElementById('zaixianPage'),
            yidian: document.getElementById('yidianPage'),
            wodeduanwei: document.getElementById('wodeduanweiPage'),
            dacall: document.getElementById('dacallPage'),
            shoucang: document.getElementById('shoucangPage'),
            gengduo: document.getElementById('gengduoPage'),
            xiaoxi: document.getElementById('xiaoxiPage'),
            diange: document.getElementById('diangePage'),
            dianzan: document.getElementById('dianzanPage'),
            liaotian: document.getElementById('liaotianPage'),
            yunying: document.getElementById('yunyingPage'),
            songli: document.getElementById('songliPage'),
            yinliang: document.getElementById('yinliangPage')
        };
        
        const backBtn = document.getElementById('backBtn');
        let currentPage = 'home';
        
        function goToPage(pageName) {
            if (pages[pageName]) {
                pages[currentPage].classList.remove('active');
                pages[pageName].classList.add('active');
                currentPage = pageName;
                
                if (pageName === 'home') {
                    backBtn.classList.remove('visible');
                } else {
                    backBtn.classList.add('visible');
                }
            }
        }
        
        backBtn.addEventListener('click', function() {
            goToPage('home');
        });
        
        document.querySelectorAll('.hotspot').forEach(hotspot => {
            hotspot.addEventListener('click', function() {
                const pageName = this.getAttribute('data-page');
                if (pageName) {
                    goToPage(pageName);
                }
            });
        });
        
        function handleImageError(img) {
            img.style.display = 'none';
            const titleId = 'title' + img.alt.replace(/[^a-zA-Z]/g, '');
            const title = document.getElementById(titleId);
            if (title) {
                title.style.display = 'block';
            }
        }
    </script>
</body>
</html>
