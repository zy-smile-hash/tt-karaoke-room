<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TT语音K歌房</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        #app {
            width: 375px;
            height: 667px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            background: linear-gradient(180deg, #1a0a2e 0%, #2d1b4e 50%, #1a0a2e 100%);
        }

        .sakura-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('kefang-design.jpg');
            background-size: cover;
            background-position: center;
            opacity: 0.4;
            z-index: 0;
        }

        .sakura-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at top, rgba(100, 50, 120, 0.3) 0%, transparent 50%),
                        radial-gradient(ellipse at bottom, rgba(50, 30, 80, 0.5) 0%, transparent 60%);
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .scroll-container {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 70px;
            -webkit-overflow-scrolling: touch;
        }

        .scroll-container::-webkit-scrollbar {
            display: none;
        }

        .btn-press:active {
            transform: scale(0.95);
            opacity: 0.8;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
            animation: fadeIn 0.2s ease-out;
        }

        .modal {
            width: 90%;
            max-width: 320px;
            background: linear-gradient(180deg, #2d1b4e 0%, #1a0a2e 100%);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            animation: modalSlideIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes modalSlideIn {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .singing-avatar {
            animation: pulse 1.5s ease-in-out infinite;
        }

        .gift-btn {
            animation: bounce 2s ease-in-out infinite;
        }

        .message-item {
            animation: fadeIn 0.3s ease-out;
        }

        .mic-indicator {
            position: absolute;
            bottom: -2px;
            left: 50%;
            transform: translateX(-50%);
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 8px;
            font-weight: bold;
            white-space: nowrap;
        }
    </style>
</head>

                                <div class="text-white/60 text-xs">刘若英</div>
                            </div>
                            <button class="px-3 py-1 bg-purple-500 rounded-full text-white text-xs btn-press">点歌</button>
                        </div>
                    </div>
                    <div class="bg-white/5 rounded-xl p-3">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-purple-500 to-purple-700 flex items-center justify-center">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="white">
                                    <path d="M8 5v14l11-7z"/>
                                </svg>
                            </div>
                            <div class="flex-1">
                                <div class="text-white text-sm">夜曲</div>
                                <div class="text-white/60 text-xs">周杰伦</div>
                            </div>
                            <button class="px-3 py-1 bg-purple-500 rounded-full text-white text-xs btn-press">点歌</button>
                        </div>
                    </div>
                </div>
            `);
        });

        // 已点列表
        document.getElementById('btnSongList').addEventListener('click', () => {
            openModal('已点歌曲', `
                <div class="mb-4">
                    <div class="bg-white/5 rounded-xl p-3 mb-2">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-purple-500 to-purple-700 flex items-center justify-center">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="white">
                                    <path d="M8 5v14l11-7z"/>
                                </svg>
                            </div>
                            <div class="flex-1">
                                <div class="text-white text-sm">Melody (伴奏)</div>
                                <div class="text-white/60 text-xs">陶喆</div>
                            </div>
                            <span class="text-green-400 text-xs font-medium">演唱中</span>
                        </div>
                    </div>
                    <div class="bg-white/5 rounded-xl p-3">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-purple-500 to-purple-700 flex items-center justify-center">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="white">
                                    <path d="M8 5v14l11-7z"/>
                                </svg>
                            </div>
                            <div class="flex-1">
                                <div class="text-white text-sm">没那么简单 (DJ阿lo版)</div>
                                <div class="text-white/60 text-xs">黄小琥</div>
                            </div>
                            <span class="text-yellow-400 text-xs font-medium">下一首</span>
                        </div>
                    </div>
                </div>
            `);
        });

        // 发送消息
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && messageInput.value.trim()) {
                sendMessage();
            }
        });

        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            const messageDiv = document.createElement('div');
            messageDiv.className = 'mb-2 message-item';
            messageDiv.innerHTML = `
                <div class="bg-white/10 rounded-br-xl rounded-tr-xl rounded-tl-none px-3 py-2">
                    <div class="flex items-center gap-1.5 mb-1">
                        <span class="text-yellow-400 text-xs font-semibold">我:</span>
                    </div>
                    <div class="text-white/90 text-xs">${text}</div>
                </div>
            `;
            chatArea.appendChild(messageDiv);
            messageInput.value = '';
            
            // 滚动到底部
            const scrollContainer = document.querySelector('.scroll-container');
            scrollContainer.scrollTop = scrollContainer.scrollHeight;
        }

        // 礼物按钮
        document.getElementById('btnGift').addEventListener('click', () => {
            openModal('礼物商店', `
                <div class="grid grid-cols-4 gap-2 mb-4">
                    ${['鲜花', '掌声', '爱心', '星星', '火箭', '飞机', '游艇', '城堡'].map((gift, i) => `
                        <button class="flex flex-col items-center gap-1 p-2 bg-white/5 rounded-xl btn-press">
                            <div class="w-8 h-8 rounded-full bg-gradient-to-br from-purple-400 to-pink-500 flex items-center justify-center">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="white">
                                    <path d="M12,21.35L10.55,20.03C5.4,15.36 2,12.27 2,8.5C2,5.41 4.42,3 7.5,3C9.24,3 10.91,3.81 12,5.08C13.09,3.81 14.76,3 16.5,3C19.58,3 22,5.41 22,8.5C22,12.27 18.6,15.36 13.45,20.03L12,21.35Z"/>
                                </svg>
                            </div>
                            <span class="text-white/80 text-[10px]">${gift}</span>
                        </button>
                    `).join('')}
                </div>
            `);
        });

        // 快速礼物
        document.getElementById('btnQuickGift').addEventListener('click', () => {
            openModal('0.1元自选礼物', `
                <div class="text-center">
                    <p class="text-white/70 text-sm mb-4">选择一个礼物送给歌手！</p>
                    <div class="grid grid-cols-3 gap-2 mb-4">
                        ${['鲜花', '掌声', '爱心'].map(gift => `
                            <button class="flex flex-col items-center gap-1 p-2 bg-white/5 rounded-xl btn-press" onclick="closeModal()">
                                <div class="w-10 h-10 rounded-full bg-gradient-to-br from-purple-400 to-pink-500 flex items-center justify-center">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                                        <path d="M12,21.35L10.55,20.03C5.4,15.36 2,12.27 2,8.5C2,5.41 4.42,3 7.5,3C9.24,3 10.91,3.81 12,5.08C13.09,3.81 14.76,3 16.5,3C19.58,3 22,5.41 22,8.5C22,12.27 18.6,15.36 13.45,20.03L12,21.35Z"/>
                                    </svg>
                                </div>
                                <span class="text-white/80 text-[10px]">${gift}</span>
                            </button>
                        `).join('')}
                    </div>
                </div>
            `);
        });

        // 打Call
        document.getElementById('btnCall').addEventListener('click', () => {
            // 简单的动画效果
            const btn = document.getElementById('btnCall');
            btn.style.transform = 'scale(1.2)';
            setTimeout(() => {
                btn.style.transform = 'scale(1)';
            }, 200);
        });

        // 黑粉
        document.getElementById('btnBlackGroup').addEventListener('click', () => {
            openModal('房间管理', `
                <div class="space-y-3">
                    <button class="w-full flex items-center gap-3 p-3 bg-white/5 rounded-xl btn-press">
                        <div class="w-8 h-8 rounded-full bg-purple-500/20 flex items-center justify-center">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="#a855f7">
                                <path d="M12,4A4,4 0 0,1 16,8A4,4 0 0,1 12,12A4,4 0 0,1 8,8A4,4 0 0,1 12,4M12,14C16.42,14 20,15.79 20,18V20H4V18C4,15.79 7.58,14 12,14Z"/>
                            </svg>
                        </div>
                        <div class="text-left">
                            <div class="text-white text-sm">房间成员</div>
                            <div class="text-white/60 text-xs">查看和管理房间成员</div>
                        </div>
                    </button>
                    <button class="w-full flex items-center gap-3 p-3 bg-white/5 rounded-xl btn-press">
                        <div class="w-8 h-8 rounded-full bg-red-500/20 flex items-center justify-center">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="#ef4444">
                                <path d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z"/>
                            </svg>
                        </div>
                        <div class="text-left">
                            <div class="text-white text-sm">黑名单</div>
                            <div class="text-white/60 text-xs">管理黑名单用户</div>
                        </div>
                    </button>
                </div>
            `);
        });
    </script>
</body>
</html>
