<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TT语音K歌房</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a2e;
        }

        .phone-container {
            width: 375px;
            height: 812px;
            background-color: #000;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .phone-screen {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .main-screen {
            width: 100%;
            height: 100%;
            background: url('design_image.png') center/cover no-repeat;
            position: relative;
        }

        .secondary-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1a2e;
            display: none;
            flex-direction: column;
            z-index: 100;
        }

        .secondary-screen.active {
            display: flex;
        }

        .secondary-header {
            display: flex;
            align-items: center;
            padding: 20px 16px;
            background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0) 100%);
        }

        .back-btn {
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
        }

        .screen-title {
            color: white;
            font-size: 18px;
            font-weight: 600;
            margin-left: 12px;
        }

        .secondary-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            color: white;
        }

        .clickable-area {
            position: absolute;
            cursor: pointer;
            z-index: 10;
        }

        /* 按钮区域 - 根据设计图上的按钮位置 */
        .room-info-btn {
            top: 55px;
            left: 20px;
            width: 200px;
            height: 60px;
        }

        .star-btn {
            top: 58px;
            right: 100px;
            width: 40px;
            height: 40px;
        }

        .share-btn {
            top: 58px;
            right: 55px;
            width: 40px;
            height: 40px;
        }

        .power-btn {
            top: 58px;
            right: 10px;
            width: 40px;
            height: 40px;
        }

        .my-level-btn {
            top: 125px;
            left: 20px;
            width: 150px;
            height: 35px;
        }

        .user-avatar-btn {
            top: 120px;
            right: 90px;
            width: 55px;
            height: 55px;
            border-radius: 50%;
        }

        .sing-mode-btn {
            top: 325px;
            left: 35px;
            width: 140px;
            height: 45px;
            border-radius: 20px;
        }

        .accompany-btn {
            top: 325px;
            right: 35px;
            width: 140px;
            height: 45px;
            border-radius: 20px;
        }

        .song-list-btn {
            top: 480px;
            left: 20px;
            width: 140px;
            height: 40px;
        }

        .order-song-btn {
            top: 480px;
            right: 20px;
            width: 90px;
            height: 50px;
            border-radius: 25px;
        }

        .mic-btn-1 {
            top: 540px;
            left: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
        }

        .mic-btn-2 {
            top: 540px;
            left: 90px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
        }

        .mic-btn-3 {
            top: 540px;
            left: 160px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
        }

        .mic-btn-4 {
            top: 540px;
            right: 90px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
        }

        .mic-btn-5 {
            top: 540px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
        }

        .tcall-btn {
            top: 650px;
            right: 15px;
            width: 120px;
            height: 120px;
        }

        .join-club-btn {
            top: 720px;
            right: 20px;
            width: 140px;
            height: 40px;
            border-radius: 20px;
        }

        .bottom-gift-btn {
            bottom: 20px;
            left: 75px;
            width: 55px;
            height: 55px;
        }

        .sound-btn {
            bottom: 20px;
            left: 140px;
            width: 55px;
            height: 55px;
        }

        .message-btn {
            bottom: 20px;
            left: 205px;
            width: 55px;
            height: 55px;
        }

        .menu-btn {
            bottom: 20px;
            right: 25px;
            width: 55px;
            height: 55px;
        }

        .chat-input-btn {
            bottom: 20px;
            left: 20px;
            width: 170px;
            height: 50px;
            border-radius: 25px;
        }

        .page-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
        }

        .page-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .page-desc {
            font-size: 16px;
            color: rgba(255,255,255,0.7);
        }

        .collect-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 20px 40px;
            border-radius: 12px;
            font-size: 18px;
            z-index: 200;
            display: none;
        }

        .collect-hint.show {
            display: block;
            animation: fadeInOut 1.5s ease-out;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            20%, 80% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <div class="phone-screen">
            <!-- 主屏幕 -->
            <div class="main-screen" id="mainScreen">
                <!-- 顶部按钮 -->

                <div class="clickable-area star-btn" data-action="collect"></div>

                <!-- 中部按钮 -->

                <!-- 麦位按钮 -->

                <div class="clickable-area mic-btn-2" data-page="mic-2"></div>
                <div class="clickable-area mic-btn-3" data-page="mic-3"></div>

                <div class="clickable-area mic-btn-5" data-page="mic-5"></div>
                
                <!-- 打Call和厂牌按钮 -->

                <div class="clickable-area join-club-btn" data-page="join-club"></div>
                
                <!-- 底部按钮 -->
                <div class="clickable-area bottom-gift-btn" data-page="gift-shop"></div>
                <div class="clickable-area sound-btn" data-page="sound-settings"></div>
                <div class="clickable-area message-btn" data-page="messages"></div>
                <div class="clickable-area menu-btn" data-page="menu"></div>
                <div class="clickable-area chat-input-btn" data-page="chat"></div>
            </div>

            <!-- 收藏提示 -->
            <div class="collect-hint" id="collectHint">已收藏</div>

            <!-- 二级页面 - 框架结构 -->

                <div class="secondary-header">

                </div>
                <div class="secondary-content">
                    <div class="page-content">
                        <div class="page-icon">🏠</div>
                        <div class="page-desc">房间信息页面</div>
                    </div>
                </div>
            </div>

            <div class="secondary-screen" id="share-page">
                <div class="secondary-header">
                    <div class="back-btn" onclick="goBack()">←</div>
                    <div class="screen-title">分享</div>
                </div>
                <div class="secondary-content">
                    <div class="page-content">
                        <div class="page-icon">🔗</div>
                        <div class="page-desc">分享页面</div>
                    </div>
                </div>
            </div>

            <div class="secondary-screen" id="level-page">
                <div class="secondary-header">
                    <div class="back-btn" onclick="goBack()">←</div>
                    <div class="screen-title">我的段位</div>
                </div>
                <div class="secondary-content">
                    <div class="page-content">
                        <div class="page-icon">🏆</div>

                    </div>
                </div>
            </div>

            <div class="secondary-screen" id="user-profile-page">
                <div class="secondary-header">
                    <div class="back-btn" onclick="goBack()">←</div>
                    <div class="screen-title">用户资料</div>

                <div class="secondary-content">
                    <div class="page-content">
                        <div class="page-icon">👤</div>

                    </div>
                </div>
            </div>

            <div class="secondary-screen" id="sing-mode-page">
                <div class="secondary-header">
                    <div class="back-btn" onclick="goBack()">←</div>
                    <div class="screen-title">演唱模式</div>
                </div>
                <div class="secondary-content">
                    <div class="page-content">
                        <div class="page-icon">🎤</div>
                        <div class="page-desc">演唱模式页面</div>
                    </div>
                </div>
            </div>

            <div class="secondary-screen" id="accompany-page">
                <div class="secondary-header">
                    <div class="back-btn" onclick="goBack()">←</div>
                    <div class="screen-title">伴奏设置</div>
                </div>
                <div class="secondary-content">
                    <div class="page-content">
                        <div class="page-icon">🎵</div>
                        <div class="page-desc">伴奏设置页面</div>
                    </div>
                </div>
            </div>

            <div class="secondary-screen" id="song-list-page">
                <div class="secondary-header">
                    <div class="back-btn" onclick="goBack()">←</div>
                    <div class="screen-title">已点歌单</div>

                <div class="secondary-content">

                <div class="secondary-header">

            <div class="secondary-screen" id="mic-1-page">
                <div class="secondary-header">
                    <div class="back-btn" onclick="goBack()">←</div>
                    <div class="screen-title">麦位管理</div>
                </div>
                <div class="secondary-content">
                    <div class="page-content">
                        <div class="page-icon">🎤</div>
                        <div class="page-desc">麦位1页面</div>
                    </div>
                </div>
            </div>

            <div class="secondary-screen" id="mic-2-page">
                <div class="secondary-header">
                    <div class="back-btn" onclick="goBack()">←</div>
                    <div class="screen-title">麦位管理</div>
                </div>
                <div class="secondary-content">

            <div class="secondary-screen" id="mic-3-page">

                </div>
                <div class="secondary-content">
                    <div class="page-content">

                    </div>
                </div>
            </div>

            <div class="secondary-screen" id="mic-4-page">
                <div class="secondary-header">
                    <div class="back-btn" onclick="goBack()">←</div>
                    <div class="screen-title">麦位管理</div>
                </div>
                <div class="secondary-content">
                    <div class="page-content">
                        <div class="page-icon">🎤</div>
                        <div class="page-desc">麦位4页面</div>
                    </div>
                </div>
            </div>

            <div class="secondary-screen" id="mic-5-page">
                <div class="secondary-header">
                    <div class="back-btn" onclick="goBack()">←</div>
                    <div class="screen-title">麦位管理</div>
                </div>
                <div class="secondary-content">
                    <div class="page-content">
                        <div class="page-icon">🎤</div>
                        <div class="page-desc">麦位5页面</div>
                    </div>
                </div>
            </div>

            <div class="secondary-screen" id="join-club-page">
                <div class="secondary-header">
                    <div class="back-btn" onclick="goBack()">←</div>
                    <div class="screen-title">加入厂牌</div>
                </div>
                <div class="secondary-content">
                    <div class="page-content">
                        <div class="page-icon">🏷️</div>
                        <div class="page-desc">厂牌页面</div>

            </div>

            <div class="secondary-screen" id="gift-shop-page">

                    <div class="back-btn" onclick="goBack()">←</div>
                    <div class="screen-title">礼物商店</div>

                <div class="secondary-content">

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const clickableAreas = document.querySelectorAll('.clickable-area');
            
            clickableAreas.forEach(area => {
                area.addEventListener('click', function() {
                    const pageName = this.getAttribute('data-page');
                    const action = this.getAttribute('data-action');
                    
                    if (action) {
                        handleAction(action);
                    } else if (pageName) {
                        openPage(pageName);
                    }
                });
            });
        });

        function openPage(pageName) {
            document.getElementById('mainScreen').style.display = 'none';
            
            const pageId = pageName + '-page';
            const pageElement = document.getElementById(pageId);
            if (pageElement) {
                pageElement.classList.add('active');
            }
        }

        function goBack() {
            const allPages = document.querySelectorAll('.secondary-screen');
            allPages.forEach(page => {
                page.classList.remove('active');
            });
            document.getElementById('mainScreen').style.display = 'block';
        }

        function handleAction(action) {
            switch(action) {
                case 'collect':
                    const hint = document.getElementById('collectHint');
                    hint.classList.add('show');
                    setTimeout(() => hint.classList.remove('show'), 1500);
                    break;
                case 'exit':
                    alert('确定要退出房间吗？');
                    break;
                case 'tcall':
                    alert('打Call！');
                    break;
            }
        }
    </script>

</html>
